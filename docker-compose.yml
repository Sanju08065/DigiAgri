services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/digital-agriculture
      - JWT_SECRET=your_jwt_secret_change_in_production
      - NODE_ENV=production
    depends_on:
      - mongo
    volumes:
      - uploads:/app/uploads

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo_data:
  uploads:
