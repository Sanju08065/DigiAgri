name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-server:
    name: Server - Install and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test_secret

  test-client:
    name: Client - Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: https://digi-agri-h51b.vercel.app/api
      - name: Run tests
        run: npm test

  deploy-server:
    name: Deploy Backend to Vercel
    needs: [test-server, test-client]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Link and deploy backend
        run: |
          cd server
          vercel link --yes \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --project="${{ secrets.VERCEL_BACKEND_PROJECT_ID }}" \
            --scope="${{ secrets.VERCEL_ORG_ID }}"
          vercel deploy --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

  deploy-client:
    name: Deploy Frontend to Vercel
    needs: [test-server, test-client]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Link and deploy frontend
        run: |
          cd client
          vercel link --yes \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --project="${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}" \
            --scope="${{ secrets.VERCEL_ORG_ID }}"
          vercel deploy --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
